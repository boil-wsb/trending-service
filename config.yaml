# Trending Service 配置文件
# 此文件支持热加载，修改后无需重启服务即可生效

database:
  path: data/db/trending.db
  backup_count: 7
  cleanup_days: 30

server:
  host: localhost
  port: 8888
  debug: false
  threaded: true

ui:
  default_theme: dark  # 默认主题选项: light 或 dark

data_sources:
  github:
    enabled: true
    limit: 20
    languages:
      - python
      - javascript
      - go
      - rust
      - java
    since: weekly
  bilibili:
    enabled: true
    limit: 20
    categories:
      - 科技
      - 人工智能
      - 编程
  arxiv:
    enabled: true
    limit: 20
    categories:
      - cs.AI
      - cs.LG
      - cs.CV
  ai:
    enabled: true
    limit: 20
    keywords:
      - ai
      - machine
      - learning
      - ml
      - neural
      - gpt
  hackernews:
    enabled: true
    limit: 30
  zhihu:
    enabled: true
    limit: 30
  weibo:
    enabled: true
    limit: 30
  douyin:
    enabled: true
    limit: 20
  aihot:
    enabled: true
    limit: 100
    mode: selected
    category: null
  index:
    enabled: true
    auto_fetch: false
    # 概念板块白名单：仅抓取名称命中以下关键词的概念板块（东财源，共 494 个）
    # 留空 [] 则不抓取任何概念板块；填关键词则做包含匹配（大小写不敏感）
    concept_watchlist:
      # === AI/算力/芯片 ===
      - AI芯片
      - 算力概念
      - CPO概念
      - PCB
      - 存储芯片
      - 光刻机
      - 第三代半导体
      - 第四代半导体
      - 半导体概念
      - 国产芯片
      - 汽车芯片
      - MCU
      - MLCC
      - AIGC概念
      - AI应用
      - AI智能体
      - AI语料
      - AI手机
      - AI眼镜
      - AIPC
      - 多模态AI
      - 智谱AI概念
      # === 新能源/电池/光伏 ===
      - 光伏概念
      - 锂电池概念
      - HJT电池
      - TOPCon电池
      - BC电池
      - 钙钛矿电池
      - 储能概念
      - 氢能源
      - 充电桩
      - 新能源车
      - 新能源
      - 燃料电池概念
      - 电池技术
      - 钒电池
      - 钠离子电池
      - 固态电池
      - 麒麟电池
      - 刀片电池
      - 动力电池回收
      - 无线充电
      - 熔盐储能
      # === 其他 ===
      - 培育钻石
      - 创新药

schedule:
  fetch_trending:
    schedule: "0 */8 * * *"
    enabled: true
    description: "获取所有热点信息"
    timezone: Asia/Shanghai
  fetch_index:
    schedule: "10,40 * * * 1-5"
    enabled: true
    description: "获取A股指数行情数据（仅在开盘时间内执行）"
    timezone: Asia/Shanghai
    # A股开盘时间窗口（北京时间）
    trading_hours:
      - { start: "09:10", end: "11:30" }
      - { start: "13:00", end: "14:40" }
    # 交易日期：1=周一 ... 7=周日
    trading_days: [1, 2, 3, 4, 5]

logging:
  level: INFO
  format: "%(asctime)s.%(msecs)03d - %(levelname)s - %(name)s:%(lineno)d - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  file: data/logs/trending_service.log
  max_size: 10485760
  backup_count: 5

data_files:
  github_trending: data/reports/github_trending.json
  github_weekly_growth: data/reports/github_weekly_growth.json
  ai_trending: data/reports/ai_trending.json
  bilibili_trending: data/reports/bilibili_trending.json
  arxiv_biology: data/reports/arxiv_biology.json
  arxiv_computer_ai: data/reports/arxiv_computer_ai.json

routes:
  report: /report.html
  api: /api/
  static: /static/

browser:
  auto_open: true
  url: http://localhost:8888/report.html

requests:
  timeout: 60
  retry_count: 3
  delay: 1
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

proxy:
  enabled: false
  http: ""
  https: ""

source_urls:
  github_trending: https://github.com/trending
  bilibili_hot: https://www.bilibili.com/hot
  arxiv_search: https://arxiv.org/search
